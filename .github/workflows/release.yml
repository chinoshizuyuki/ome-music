name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ome Music ${{ github.ref_name }}"
          releaseBody: |
            # Ome Music ${{ github.ref_name }}

            小而美的沉浸式桌面音乐播放器，支持本地音乐、网易云音乐、Bilibili 音频与 AI 电台解说。

            > 完整版本历史见 [`docs/CHANGELOG.md`](https://github.com/zerolyx/ome-music/blob/main/docs/CHANGELOG.md)。

            ---

            ## 下载

            | 文件 | 说明 |
            |------|------|
            | `Ome.Music_*_x64-setup.exe` | Windows 安装包（NSIS，含 WebView2 引导安装） |

            > 当前版本为未签名开发发布版，Windows 首次运行时会弹出 SmartScreen 安全提示，点击"仍要运行"即可。

            ---

            ## 本次更新 / What's New in ${{ github.ref_name }}

            ### 紧急修复（v0.3.0 回归问题）
            - **网易云扫码登录弹窗不出现**：恢复非阻断式的本地 API 预检，扫码与搜索请求不再被环境检查卡死，点击「扫码登录」即可正常弹出二维码。
            - **启用网易云后搜索不到歌曲**：同一根因修复；同时搜索失败时透出后端真实错误（如「NetEase API 未连接，请检查本地服务」），而非笼统的「outside source is quiet」。

            ### 播放体验
            - **随机播放改为 Fisher-Yates 洗牌队列**：整轮不重复，播完重新洗牌，解决原 `Math.random()` 真随机约 17 次后重复率超 50% 的「伪随机、容易重复」体感。
            - **「上一首」加入播放历史栈**：shuffle 下也能回到实际播放过的曲目，而非再次随机抽取。
            - **单曲列表「列表循环」可正常循环**：修复只有 1 首歌时列表循环停止的问题。
            - **单曲循环不再阻塞电台/临时歌单队列**：先消耗排队曲目，仅队列空时才单曲循环。
            - **歌单同步后当前曲目丢失导致控制条消失**：校验当前曲目是否在新列表中，不在则回退到首曲，并重置洗牌队列。
            - **URL 过期后播放中断无法恢复**：签名 URL / 代理 token 过期后自动重新解析，无需手动切歌再切回。

            ### UI 与设置
            - **修复底部空白与窗口可上下拖拽**：恢复 `h-screen overflow-hidden`，消除 v0.3 重构引入的滚动容器回归。
            - **删除死代码与冗余按钮**：移除从未被调用的 `PlaylistAnalysisPanel` 与重复的「检查状态」按钮（已有自动轮询）。
            - **搜索加载文案明确化**：从诗意的 "Listening outside the room" 改为 "Searching NetEase Cloud Music…"，新用户易理解。

            ### 工程化
            - **CI 流水线**：Rust（`cargo check` / `clippy -D warnings` / `fmt --check`）+ TypeScript（`tsc --noEmit` / ESLint / Prettier）双套检查全量通过。
            - **云端同步核查**：新增 `verify-cloud-sync` job，三重核查（SHA 比对 + GitHub API + 关键文件落地）确保提交真正推送至云端，杜绝「本地显示已推送、远端实际缺失」的静默失败。
            - **Docker 镜像**：`ome-netease-api`（网易云 API 服务）与 `ome-build-env`（Tauri Linux 构建环境）跟随版本 tag 推送到 GHCR。
            - **贡献者**：欢迎 [@chinokoyuki](https://github.com/chinokoyuki) 加入，贡献 CI/CD 流水线（[PR #2](https://github.com/zerolyx/ome-music/pull/2)）。

            ### 第二轮审查优化（P0 / P1 / P2）
            - **P0 Bilibili token 无法保存**：`save()` 硬编码 `token: undefined` 导致 Bilibili token 永远不写入。改为 `token: bilibiliToken.trim() || undefined`，并复用统一草稿保存入口。
            - **P0 QR 过期/超时无兜底**：新增 `QrSessionStatus` 状态机（waiting / scanned / expired / timeout）+ max-life 兜底（网易云 180s / Bilibili 200s），过期/超时后保留弹窗供「重新生成 / Regenerate」。
            - **P0 未启用源搜索无提示**：新增 `SourceDisabledHint` 组件 + 「启用 / Enable」按钮直达设置，未启用源不再静默不渲染。
            - **P1 多重保存路径收敛**：`saveSourceDraft({ token? })` / `saveBilibiliDraft({ token? })` 收敛分散的 token 保存逻辑。
            - **P1 搜索结果分页**：移除 `slice(0, 12)` 丢失 8 条的问题，新增 `ShowMoreButton` 客户端分页（每页 6 条）。
            - **P1 danmaku direction UI 补齐**：新增 `DanmakuChoiceGroup` 控件，补齐 rtl / ltr / mixed 方向选择。
            - **P1 诗意文案 → 中英双语直白文案**：统一 9 处模糊错误为「中文 / English」格式（Rust 4 处 + 前端 5 处），DJ 风格状态文案保留。
            - **P2 StoragePanel 抽取**：~130 行存储 UI 收敛为单一组件。
            - **P2 设置面板冗余 UI 清理**：存储入口 3→1、导出诊断 2→1、模型 input+select 合并为 input+datalist 单控件。

            ---

            ## 新手使用教程

            ### 第 1 步：安装

            1. 下载 `Ome.Music_*_x64-setup.exe`
            2. 双击运行，按提示完成安装
            3. 首次安装时会自动下载 WebView2 运行时（需联网），约 2 MB
            4. 安装完成后从开始菜单启动「Ome Music」

            ### 第 2 步：导入本地音乐

            1. 打开 Ome Music，点击顶部搜索框
            2. 输入本地音乐文件夹路径（如 `D:\Music`），按回车
            3. 软件会自动扫描并导入该文件夹下所有音频文件（mp3/flac/wav/m4a 等）

            ### 第 3 步：连接网易云音乐

            网易云音乐功能需要 NeteaseCloudMusicApi 服务。v0.2 起软件启动时会自动检测系统环境：

            - **如果已安装 Node.js v20+**：软件自动启动内置 API 服务，可直接搜索和播放
            - **如果未安装 Node.js**：屏幕中央会弹出居中提示框「缺少运行环境 Node.js」，提供三个操作：
              - 「下载 Node.js」按钮：打开 https://nodejs.org 下载 LTS 版（v20+）
              - 「重新检测」按钮：安装并重启软件后点击此按钮重新检测
              - 「稍后再说」按钮：暂不处理（仅本地音乐可正常播放）

            **方式 A（推荐新手）：安装 Node.js**
            1. 访问 https://nodejs.org 下载 LTS 版（v20+）
            2. 安装时勾选「Add to PATH」
            3. 重启 Ome Music，点击提示框中的「重新检测」即可

            **方式 B：使用外部 API 服务**
            1. 在设置 → 音乐来源中，将 NetEase Base URL 改为已部署的 API 地址
            2. 例如自建服务器地址 `http://your-server:3000`

            ### 第 4 步：登录网易云账号（播放会员歌曲）

            1. 进入设置 → 音乐来源 → NetEase Cloud Music
            2. 点击「扫码登录」用网易云 App 扫码，或粘贴 Cookie 登录
            3. 登录成功后即可播放会员歌曲（需有对应会员资格）

            ### 第 5 步：搜索与播放

            1. 在顶部搜索框输入歌曲名/歌手名
            2. 切换来源标签（本地 / 网易云 / Bilibili）
            3. 点击搜索结果即可播放

            ### 第 6 步：歌词与弹幕氛围

            - 歌词自动获取，点击右上角齿轮可调整歌词偏移
            - 在设置 → 弹幕氛围中开启弹幕效果

            ---

            ## 依赖环境说明

            | 依赖 | 是否必须 | 是否已内置 | 说明 |
            |------|----------|-----------|------|
            | WebView2 运行时 | 必须 | 安装时自动下载 | Windows 10/11 通常已自带 |
            | Node.js v20+ | 网易云功能必须 | 否，需自行安装 | 仅使用本地音乐则不需要 |
            | Windows 凭据管理器 | 必须 | 系统自带 | 用于安全存储登录凭据 |
            | 网络 | 搜索/流媒体必须 | — | 本地音乐播放不需要 |

            - **SQLite 数据库**：已静态编译进程序，无需额外安装
            - **TLS 加密**：使用 rustls 静态编译，不依赖系统 OpenSSL
            - **卸载**：通过控制面板卸载即可，卸载后会自动清理数据目录、凭据和注册表残留

            ---

            ## 系统要求

            - Windows 10 64 位及以上（需 WebView2 支持）
            - 最低 4 GB 内存
            - 100 MB 可用磁盘空间
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  # ── Docker: 网易云 API 服务镜像 ──────────────────────────────
  docker-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ome-netease-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 构建并推送 API 镜像
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Docker: Tauri Linux 构建环境镜像 ──────────────────────────
  docker-build-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ome-build-env
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 构建并推送构建环境镜像
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
